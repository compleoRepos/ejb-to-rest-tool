# Compleo v2 - Configuration
server.port=8080
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.thymeleaf.cache=false

# Répertoire temporaire pour les fichiers uploadés
app.upload.dir=${java.io.tmpdir}/ejb-to-rest-uploads
app.output.dir=${java.io.tmpdir}/ejb-to-rest-output

# Logging fichier pour debug
logging.file.name=ejb-to-rest.log
logging.level.com.bank.tools.generator=DEBUG
logging.level.root=WARN
server.error.include-stacktrace=always
server.error.include-message=always
