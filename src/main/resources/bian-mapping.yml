# ============================================================
# BIAN Mapping Configuration — Compleo EJB-to-REST Generator
# ============================================================
#
# Ce fichier est la propriete de Compleo. Il configure le mapping
# entre les UseCases EJB legacy et les Service Domains BIAN.
#
# Le generateur est AUTONOME : ce fichier embarque dans le classpath
# contient toutes les regles de mapping. Aucun fichier BIAN n'est
# attendu en entree avec le projet EJB.
#
# Strategie de resolution (BianMappingResolver) :
# 1. Mapping explicite par nom exact du UseCase
# 2. Mapping automatique par mots-cles (domain + action + BQ)
# 3. Fallback : kebab-case du nom + action "execution"
#
# Tableau BIAN definitif des 8 actions :
# | Action       | HTTP | {cr-reference-id} | Code |
# |-------------|------|-------------------|------|
# | initiation   | POST | NON               | 201  |
# | evaluation   | POST | NON               | 200  |
# | notification | POST | NON               | 201  |
# | retrieval    | POST | OUI               | 200  |
# | execution    | POST | OUI               | 200  |
# | control      | PUT  | OUI               | 200  |
# | update       | PUT  | OUI               | 200  |
# | termination  | PUT  | OUI               | 200  |

bian:
  version: "12.0"
  base-path: "/api/v1"

  # ============================================================
  # EXPLICIT MAPPING — 12 UseCases Compleo
  # ============================================================
  explicit-mapping:
    # --- Card Management (SD0070) ---
    - use-case: "ActiverCarteUC"
      service-domain: "card-management"
      bian-id: "SD0070"
      behavior-qualifier: "activation"
      action: "execution"
      summary: "Activation d'une carte bancaire"

    - use-case: "ReceptionnerCarteUC"
      service-domain: "card-management"
      bian-id: "SD0070"
      behavior-qualifier: "reception"
      action: "execution"
      summary: "Reception d'une carte en agence"

    - use-case: "BloquerCarteUC"
      service-domain: "card-management"
      bian-id: "SD0070"
      behavior-qualifier: "blocking"
      action: "control"
      summary: "Blocage d'une carte bancaire"

    # --- Party (SD0254) ---
    - use-case: "ChargerClientDataUC"
      service-domain: "party"
      bian-id: "SD0254"
      action: "retrieval"
      summary: "Consultation des donnees client"

    - use-case: "MajClientUC"
      service-domain: "party"
      bian-id: "SD0254"
      action: "update"
      summary: "Mise a jour des donnees client"

    # --- Current Account (SD0152) ---
    - use-case: "ConsulterSoldeUC"
      service-domain: "current-account"
      bian-id: "SD0152"
      behavior-qualifier: "balance"
      action: "retrieval"
      summary: "Consultation du solde"

    - use-case: "OuvrirCompteUC"
      service-domain: "current-account"
      bian-id: "SD0152"
      action: "initiation"
      summary: "Ouverture de compte"

    - use-case: "CloturerCompteUC"
      service-domain: "current-account"
      bian-id: "SD0152"
      action: "termination"
      summary: "Cloture de compte"

    # --- Payment Initiation (SD0249) ---
    - use-case: "VirementUC"
      service-domain: "payment-initiation"
      bian-id: "SD0249"
      action: "initiation"
      summary: "Virement bancaire"

    # --- Loan (SD0433) ---
    - use-case: "SimulerCreditUC"
      service-domain: "loan"
      bian-id: "SD0433"
      action: "evaluation"
      summary: "Simulation credit"

    # --- Customer Notification (SD0121) ---
    - use-case: "EnvoyerNotificationUC"
      service-domain: "customer-notification"
      bian-id: "SD0121"
      action: "notification"
      summary: "Notification client"

    # --- Document Management (SD0281) ---
    - use-case: "GenererDocumentUC"
      service-domain: "document-management"
      bian-id: "SD0281"
      action: "retrieval"
      summary: "Generation document bancaire"

  # ============================================================
  # AUTO-MAPPING (fallback si pas de match explicite)
  # ============================================================
  auto-mapping:
    keywords-to-domain:
      # --- current-account avec BQ specifiques ---
      - keywords: ["solde", "balance"]
        service-domain: "current-account"
        bian-id: "SD0152"
        behavior-qualifier: "balance"
      - keywords: ["transaction", "historique", "history"]
        service-domain: "current-account"
        bian-id: "SD0152"
        behavior-qualifier: "transaction"
      # --- current-account generique ---
      - keywords: ["compte", "account"]
        service-domain: "current-account"
        bian-id: "SD0152"

      # --- card-management avec BQ specifiques ---
      - keywords: ["bloquer", "block", "blocage"]
        service-domain: "card-management"
        bian-id: "SD0070"
        behavior-qualifier: "blocking"
      - keywords: ["activer", "activation"]
        service-domain: "card-management"
        bian-id: "SD0070"
        behavior-qualifier: "activation"
      - keywords: ["receptionner", "reception"]
        service-domain: "card-management"
        bian-id: "SD0070"
        behavior-qualifier: "reception"
      # --- card-management generique ---
      - keywords: ["carte", "card"]
        service-domain: "card-management"
        bian-id: "SD0070"

      # --- Autres service domains ---
      - keywords: ["virement", "transfer", "payment", "paiement"]
        service-domain: "payment-initiation"
        bian-id: "SD0249"
      - keywords: ["client", "party", "customer", "charger", "maj"]
        service-domain: "party"
        bian-id: "SD0254"
      - keywords: ["pret", "loan", "credit", "simuler"]
        service-domain: "loan"
        bian-id: "SD0433"
      - keywords: ["notification", "notifier", "envoyer", "sms", "email"]
        service-domain: "customer-notification"
        bian-id: "SD0121"
      - keywords: ["document", "releve", "attestation", "generer"]
        service-domain: "document-management"
        bian-id: "SD0281"

    keywords-to-action:
      - keywords: ["ouvrir", "creer", "create", "open", "initier"]
        action: "initiation"
        http-method: "POST"
        http-status: 201

      - keywords: ["consulter", "charger", "lire", "get", "retrieve", "search", "generer"]
        action: "retrieval"
        http-method: "POST"
        http-status: 200

      - keywords: ["modifier", "maj", "update", "mettre"]
        action: "update"
        http-method: "PUT"
        http-status: 200

      - keywords: ["activer", "executer", "receptionner", "execute"]
        action: "execution"
        http-method: "POST"
        http-status: 200

      - keywords: ["bloquer", "control", "verifier"]
        action: "control"
        http-method: "PUT"
        http-status: 200

      - keywords: ["simuler", "evaluer", "evaluate"]
        action: "evaluation"
        http-method: "POST"
        http-status: 200

      - keywords: ["cloturer", "fermer", "close", "terminate"]
        action: "termination"
        http-method: "PUT"
        http-status: 200

      - keywords: ["notifier", "envoyer", "notify", "send"]
        action: "notification"
        http-method: "POST"
        http-status: 201
