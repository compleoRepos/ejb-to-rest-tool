<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(activePage)">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="fas fa-university"></i>
        </div>
        <div class="sidebar-brand-text">
            DDF - BMCE Bank
            <small>Digital Factory v1.0.0</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-section">Navigation</div>
        <a th:href="@{/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
            <i class="fas fa-th-large"></i><span>Dashboard</span>
        </a>
        <a th:href="@{/import}" class="sidebar-link" th:classappend="${activePage == 'upload' ? 'active' : ''}">
            <i class="fas fa-cloud-upload-alt"></i><span>Importer Projet</span>
        </a>
        <a th:href="@{/analysis}" class="sidebar-link" th:classappend="${activePage == 'analysis' ? 'active' : ''}">
            <i class="fas fa-search-plus"></i><span>Analyse</span>
        </a>
        <a th:href="@{/configuration}" class="sidebar-link" th:classappend="${activePage == 'configuration' ? 'active' : ''}">
            <i class="fas fa-cogs"></i><span>Configuration</span>
        </a>
        <a th:href="@{/bian-mapping}" class="sidebar-link" th:classappend="${activePage == 'bian-mapping' ? 'active' : ''}">
            <i class="fas fa-sitemap"></i><span>Mapping BIAN</span>
        </a>

        <div class="sidebar-section">Transformation</div>
        <a th:href="@{/generation}" class="sidebar-link" th:classappend="${activePage == 'generation' ? 'active' : ''}">
            <i class="fas fa-rocket"></i><span>Transformation</span>
        </a>
        <a th:href="@{/results}" class="sidebar-link" th:classappend="${activePage == 'results' ? 'active' : ''}">
            <i class="fas fa-code"></i><span>Resultats</span>
        </a>
        <a th:href="@{/report}" class="sidebar-link" th:classappend="${activePage == 'report' ? 'active' : ''}">
            <i class="fas fa-chart-bar"></i><span>Rapport IA</span>
        </a>
        <a th:href="@{/export}" class="sidebar-link" th:classappend="${activePage == 'export' ? 'active' : ''}">
            <i class="fas fa-download"></i><span>Telechargement</span>
        </a>

        <div class="sidebar-section">Partenaires</div>
        <a th:href="@{/partners}" class="sidebar-link" th:classappend="${activePage == 'partners' ? 'active' : ''}">
            <i class="fas fa-handshake"></i><span>Clients Partenaires</span>
        </a>

        <div class="sidebar-section">Systeme</div>
        <a th:href="@{/logs}" class="sidebar-link" th:classappend="${activePage == 'logs' ? 'active' : ''}">
            <i class="fas fa-terminal"></i><span>Logs</span>
        </a>
        <a href="#" class="sidebar-link" onclick="event.preventDefault(); if(confirm('Reinitialiser la session ?')) document.getElementById('resetForm').submit();">
            <i class="fas fa-redo-alt"></i><span>Reinitialiser</span>
        </a>
        <form id="resetForm" th:action="@{/reset}" method="post" style="display:none;"></form>
    </nav>
    <div class="sidebar-footer">
        <span class="status-dot" th:classappend="${session.projectId != null ? 'status-active' : 'status-inactive'}"></span>
        <span th:text="${session.projectId != null ? 'Projet charge' : 'Aucun projet'}">Statut</span>
    </div>
</aside>
</body>
</html>
