<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <!-- Stats -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-history fa-2x text-primary mb-2"></i>
                    <h3 class="mb-0" th:text="${totalTransformations ?: 0}">0</h3>
                    <small class="text-muted">Total transformations</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-check-double fa-2x text-success mb-2"></i>
                    <h3 class="mb-0" th:text="${successCount ?: 0}">0</h3>
                    <small class="text-muted">Reussies</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-exclamation-triangle fa-2x text-danger mb-2"></i>
                    <h3 class="mb-0" th:text="${failureCount ?: 0}">0</h3>
                    <small class="text-muted">Echouees</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-star fa-2x text-warning mb-2"></i>
                    <h3 class="mb-0" th:text="${avgScore ?: '-'}">-</h3>
                    <small class="text-muted">Score moyen</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Tableau historique -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="fas fa-clock me-2"></i>Historique des transformations</h6>
            <div>
                <input type="text" class="form-control form-control-sm" placeholder="Rechercher..." style="width:200px;display:inline-block;">
            </div>
        </div>
        <div class="card-body p-0">
            <div th:if="${entries == null or entries.empty}" class="text-center py-5 text-muted">
                <i class="fas fa-inbox fa-3x mb-3"></i>
                <p>Aucune transformation dans l'historique</p>
                <a th:href="@{/import}" class="btn btn-primary btn-sm">
                    <i class="fas fa-upload me-1"></i>Commencer une transformation
                </a>
            </div>
            <div class="table-responsive" th:if="${entries != null and !entries.empty}">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Date</th>
                            <th>Projet</th>
                            <th>Mode</th>
                            <th>Use Cases</th>
                            <th>Score</th>
                            <th>Statut</th>
                            <th>Duree</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${entries}">
                            <td><small th:text="${entry.timestamp}">2024-01-01</small></td>
                            <td>
                                <i class="fas fa-folder text-warning me-1"></i>
                                <strong th:text="${entry.projectName}">Projet</strong>
                            </td>
                            <td><span class="badge bg-info" th:text="${entry.mode}">ACL</span></td>
                            <td th:text="${entry.useCaseCount}">0</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${entry.score >= 90 ? 'bg-success' : (entry.score >= 70 ? 'bg-warning' : 'bg-danger')}"
                                      th:text="${entry.score + '/100'}">0/100</span>
                            </td>
                            <td>
                                <span class="badge bg-success" th:if="${entry.success}">
                                    <i class="fas fa-check"></i> Reussi
                                </span>
                                <span class="badge bg-danger" th:unless="${entry.success}">
                                    <i class="fas fa-times"></i> Echec
                                </span>
                            </td>
                            <td><small th:text="${entry.duration}">0s</small></td>
                            <td>
                                <a th:href="@{/history/{id}(id=${entry.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
