<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Compleo' : 'Compleo - EJB to REST Transformation Engine'}">Compleo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white" id="sidebar-wrapper" style="width:260px;min-height:100vh;">
            <div class="sidebar-heading p-3 border-bottom border-secondary">
                <div class="d-flex align-items-center">
                    <i class="fas fa-bolt text-warning me-2 fs-4"></i>
                    <div>
                        <strong class="fs-5">Compleo</strong>
                        <br><small class="text-muted">v2.0.0</small>
                    </div>
                </div>
            </div>

            <div class="list-group list-group-flush mt-2">
                <small class="text-muted px-3 py-1 text-uppercase">Principal</small>

                <a th:href="@{/dashboard}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'dashboard' ? 'active bg-primary' : ''}">
                    <i class="fas fa-th-large me-2"></i> Dashboard
                </a>
                <a th:href="@{/import}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'upload' ? 'active bg-primary' : ''}">
                    <i class="fas fa-cloud-upload-alt me-2"></i> Importer Projet
                </a>
                <a th:href="@{/analysis}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'analysis' ? 'active bg-primary' : ''}">
                    <i class="fas fa-search-plus me-2"></i> Analyse
                </a>
                <a th:href="@{/configuration}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'configuration' ? 'active bg-primary' : ''}">
                    <i class="fas fa-cogs me-2"></i> Configuration
                </a>
                <a th:href="@{/generation}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'generation' ? 'active bg-primary' : ''}">
                    <i class="fas fa-rocket me-2"></i> Transformation
                </a>
                <a th:href="@{/results}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'results' ? 'active bg-primary' : ''}">
                    <i class="fas fa-code me-2"></i> Resultats
                </a>

                <small class="text-muted px-3 py-1 mt-3 text-uppercase">Outils</small>

                <a th:href="@{/cartography}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'cartography' ? 'active bg-primary' : ''}">
                    <i class="fas fa-project-diagram me-2"></i> Cartographie
                </a>
                <a th:href="@{/compliance}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'compliance' ? 'active bg-primary' : ''}">
                    <i class="fas fa-shield-alt me-2"></i> Conformite
                </a>
                <a th:href="@{/report}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'report' ? 'active bg-primary' : ''}">
                    <i class="fas fa-chart-bar me-2"></i> Rapport IA
                </a>
                <a th:href="@{/partners}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'partners' ? 'active bg-primary' : ''}">
                    <i class="fas fa-handshake me-2"></i> Partenaires
                </a>

                <small class="text-muted px-3 py-1 mt-3 text-uppercase">Systeme</small>

                <a th:href="@{/documentation}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'documentation' ? 'active bg-primary' : ''}">
                    <i class="fas fa-book me-2"></i> Documentation
                </a>
                <a th:href="@{/history}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'history' ? 'active bg-primary' : ''}">
                    <i class="fas fa-history me-2"></i> Historique
                </a>
                <a th:href="@{/about}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'about' ? 'active bg-primary' : ''}">
                    <i class="fas fa-info-circle me-2"></i> A propos
                </a>
                <a th:href="@{/logs}" class="list-group-item list-group-item-action bg-dark text-white border-0"
                   th:classappend="${activePage == 'logs' ? 'active bg-primary' : ''}">
                    <i class="fas fa-terminal me-2"></i> Logs
                </a>
            </div>

            <div class="p-3 border-top border-secondary mt-auto" style="position:absolute;bottom:0;width:260px;">
                <div class="d-flex align-items-center">
                    <span class="badge rounded-pill me-2"
                          th:classappend="${projectId != null ? 'bg-success' : 'bg-secondary'}">&nbsp;</span>
                    <small th:text="${projectId != null ? 'Projet charge' : 'Aucun projet'}">Statut</small>
                </div>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" style="width:calc(100% - 260px);">
            <!-- Top Navbar -->
            <nav class="navbar navbar-light bg-white border-bottom shadow-sm px-4">
                <div class="d-flex align-items-center">
                    <h5 class="mb-0" th:text="${pageTitle ?: 'Dashboard'}">Page Title</h5>
                    <small class="text-muted ms-3" th:text="${pageSubtitle ?: ''}"></small>
                </div>
                <div class="d-flex align-items-center" th:if="${projectId != null}">
                    <span class="badge bg-info">
                        <i class="fas fa-fingerprint me-1"></i>
                        <span th:text="${#strings.abbreviate(projectId, 12)}">ID</span>
                    </span>
                </div>
            </nav>

            <!-- Flash Messages -->
            <div class="container-fluid p-4">
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${warning}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${warning}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:replace="${content}">
                    <!-- Page content will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
